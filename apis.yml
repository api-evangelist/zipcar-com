aid: zipcar-com
name: Zipcar
description: >-
  Zipcar is a Boston, Massachusetts-based car sharing service operating in
  more than 500 cities across North America and Europe, including major US
  metros (Boston, Chicago, Los Angeles, New York, Philadelphia, Portland,
  San Francisco, Seattle, Washington DC) and Canadian cities (Toronto,
  Hamilton, the Golden Horseshoe). Members reserve vehicles by the hour or
  day through the Zipcar mobile app, unlock cars with their phone, and pay
  per usage with gas, EV charging, standard damage protection insurance,
  and professional maintenance included. Zipcar serves consumer members,
  universities (Zipcar for Universities), and businesses (Zipcar for
  Business) with weekday fleet programs. Zipcar is a wholly-owned
  subsidiary of Avis Budget Group, Inc. (NASDAQ: CAR), which acquired the
  company in March 2013 for approximately $500 million. Zipcar exposes a
  REST-based Partner API at api.zipcar.com/partner-api, documented at
  owa.zipcar.com/documentation, that returns JSON for Location List and
  Location Detail resources (vehicles available at a lat/long); access is
  gated and granted on request via developerportal@zipcar.com — there is
  no public OpenAPI spec, SDK, or self-service developer signup. Zipcar
  also operates a public GitHub organization (github.com/Zipcar) hosting
  internal DevOps tooling (Concourse resources, Ansible helpers, BOSH
  helpers, monitoring agents) rather than client-facing API artifacts.
